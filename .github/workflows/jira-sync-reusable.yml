name: Jira Sync (Reusable)

on:
  workflow_call:
    inputs:
      event_action:
        required: true
        type: string
      pr_title:
        required: true
        type: string
      pr_body:
        required: false
        type: string
        default: ''
      pr_url:
        required: false
        type: string
        default: ''
      pr_merged:
        required: false
        type: string
        default: 'false'
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_KEY:
        required: true
      NOTION_TOKEN:
        required: false
      NOTION_DB_ID:
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Seobway23/jira-toolkit

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Sync PR event to Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GITHUB_EVENT_ACTION: ${{ inputs.event_action }}
          GITHUB_PR_TITLE: ${{ inputs.pr_title }}
          GITHUB_PR_BODY: ${{ inputs.pr_body }}
          GITHUB_PR_URL: ${{ inputs.pr_url }}
          GITHUB_PR_MERGED: ${{ inputs.pr_merged }}
        run: python automation/jira/ci_pr_event_entrypoint.py --source github
