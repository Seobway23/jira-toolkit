# Reusable workflow: 다른 저장소에서 호출 가능
# 호출 방법:
#   uses: Seobway23/jira-toolkit/.github/workflows/jira_done_on_merge.yml@main
#   secrets: inherit

name: Jira Done On Push To Main

on:
  workflow_call:
    secrets:
      JIRA_BASE_URL:
        required: true
      JIRA_EMAIL:
        required: true
      JIRA_API_KEY:
        required: true

jobs:
  jira-done:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Mark Jira issues Done from commit messages
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_KEY: ${{ secrets.JIRA_API_KEY }}
        run: |
          BASE="https://raw.githubusercontent.com/Seobway23/jira-toolkit/main/automation/jira"
          curl -sSfL "$BASE/pr_event_sync.py" -o pr_event_sync.py

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            MSGS=$(git log -1 --format="%s")
          else
            MSGS=$(git log "$BEFORE..$AFTER" --format="%s" 2>/dev/null || git log -1 --format="%s")
          fi

          echo "커밋 메시지:"
          echo "$MSGS"

          KEYS=$(echo "$MSGS" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | sort -u)
          echo "감지된 Jira 키: $KEYS"

          for KEY in $KEYS; do
            echo "→ $KEY Done 처리 중..."
            python pr_event_sync.py \
              --event merged \
              --title "$KEY: pushed to main" \
              --url "https://github.com/${{ github.repository }}/commit/$AFTER" || echo "[skip] $KEY 처리 실패, 다음 키로 계속"
          done
